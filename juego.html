```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSabios - Ciencias Naturales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #52b788;
            --accent: #ff9f1c;
            --danger: #d90429;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #e8f5e9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 15px;
        }

        .game-card {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 5px solid white;
        }

        .top-nav {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            display: none; /* Se activa por JS */
            justify-content: space-between;
            align-items: center;
        }

        .screen { display: none; padding: 30px; }
        .screen.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-main {
            border-radius: 15px;
            padding: 15px;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .btn-grade { background: var(--primary); color: white; }
        .btn-grade:hover { background: #1b4332; transform: scale(1.02); }

        .option-btn {
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .option-btn:hover { background: #f1f8f5; border-color: var(--secondary); }
        .option-btn.selected { 
            background: #d8f3dc !important; 
            border-color: var(--primary) !important;
            color: var(--primary);
        }

        .help-panel {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .progress-bar-bg {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        .font-fredoka { font-family: 'Fredoka One', cursive; }
    </style>
</head>
<body>

<div class="game-card">
    <!-- NAVEGACIÓN -->
    <div id="nav-bar" class="top-nav">
        <div class="fw-bold">
            <span id="lvl-badge" class="badge bg-warning text-dark">Nivel 1</span>
            <span id="pts-count" class="ms-2">0 pts</span>
        </div>
        <button class="btn btn-sm btn-light fw-bold" onclick="resetTotal()">INICIO</button>
    </div>

    <!-- INICIO -->
    <div id="scr-start" class="screen active text-center">
        <h1 class="font-fredoka text-success display-4 mb-3">EcoSabios 🌿</h1>
        <p class="text-muted mb-4">Aprende Ciencias Naturales jugando</p>
        <div class="px-3">
            <button class="btn-main btn-grade" onclick="iniciarApp(5)">5to de Básica</button>
            <button class="btn-main btn-grade" onclick="iniciarApp(6)">6to de Básica</button>
            <button class="btn-main btn-grade" onclick="iniciarApp(7)">7mo de Básica</button>
        </div>
    </div>

    <!-- JUEGO -->
    <div id="scr-play" class="screen">
        <div class="progress-bar-bg">
            <div id="p-fill" class="progress-bar-fill"></div>
        </div>

        <h4 id="q-title" class="mb-4 fw-bold"></h4>
        
        <div id="options-list"></div>

        <div id="hint-box" class="help-panel">
            <strong>Pista:</strong> <span id="hint-text"></span>
        </div>

        <div class="row g-2 mt-4">
            <div class="col-6">
                <button class="btn btn-light w-100 fw-bold border" onclick="nivelPrevio()">Atrás</button>
            </div>
            <div class="col-6">
                <button class="btn btn-success w-100 fw-bold" onclick="validarOpcion()">Comprobar</button>
            </div>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-link text-danger fw-bold text-decoration-none" onclick="resetTotal()">ABANDONAR</button>
        </div>
    </div>

    <!-- FINAL -->
    <div id="scr-win" class="screen text-center">
        <h1 class="display-1">🏆</h1>
        <h2 class="font-fredoka text-success">¡ERES UN EXPERTO!</h2>
        <p class="lead">Completaste el desafío de 20 niveles.</p>
        <h3 class="mb-4 text-primary"><span id="final-score"></span> Puntos</h3>
        <button class="btn-main btn-grade" onclick="resetTotal()">Jugar de Nuevo</button>
    </div>
</div>

<script>
    const NIVELES = {
        5: [
            { q: "¿Qué parte de la planta está bajo la tierra?", a: "Raíz", o: ["Raíz", "Hoja", "Tallo"], h: "Busca agua en el suelo." },
            { q: "¿Cómo se llaman los animales con huesos?", a: "Vertebrados", o: ["Vertebrados", "Invertebrados"], h: "Tienen columna." },
            { q: "¿Qué astro nos da luz y calor?", a: "Sol", o: ["Sol", "Luna", "Marte"], h: "Es una estrella." },
            { q: "¿Qué gas necesitamos para respirar?", a: "Oxígeno", o: ["Oxígeno", "Nitrógeno"], h: "Está en el aire." },
            { q: "¿En qué estado está el hielo?", a: "Sólido", o: ["Sólido", "Líquido", "Gaseoso"], h: "Es duro." },
            { q: "¿Las plantas producen su propio alimento?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Fotosíntesis." },
            { q: "¿Cuál es un animal carnívoro?", a: "Lobo", o: ["Lobo", "Vaca", "Oveja"], h: "Come carne." },
            { q: "¿Qué sentido usamos para oír música?", a: "Oído", o: ["Oído", "Vista", "Olfato"], h: "Usas las orejas." },
            { q: "¿El Sol gira alrededor de la Tierra?", a: "Falso", o: ["Verdadero", "Falso"], h: "Es al revés." },
            { q: "¿Qué órgano bombea la sangre?", a: "Corazón", o: ["Corazón", "Estómago"], h: "Está en el pecho." },
            { q: "¿Cuál es un animal doméstico?", a: "Perro", o: ["Perro", "León", "Tiburón"], h: "Vive con humanos." },
            { q: "¿De qué color suelen ser las hojas?", a: "Verdes", o: ["Verdes", "Azules"], h: "Tienen clorofila." },
            { q: "¿La Luna es un satélite?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Gira sobre la Tierra." },
            { q: "¿Por dónde respiran los peces?", a: "Branquias", o: ["Branquias", "Pulmones"], h: "Bajo el agua." },
            { q: "¿Cuál es un ser inerte (no vivo)?", a: "Piedra", o: ["Piedra", "Árbol", "Hormiga"], h: "No nace ni crece." },
            { q: "¿Cuántas patas tiene un perro?", a: "4", o: ["2", "4", "6"], h: "Es cuadrúpedo." },
            { q: "¿El agua tiene olor?", a: "Falso", o: ["Verdadero", "Falso"], h: "Es inodora." },
            { q: "¿Qué animal vuela?", a: "Águila", o: ["Águila", "Serpiente"], h: "Tiene alas." },
            { q: "¿La Tierra es plana?", a: "Falso", o: ["Verdadero", "Falso"], h: "Es casi esférica." },
            { q: "¿Cuál fruta es ácida?", a: "Naranja", o: ["Naranja", "Plátano"], h: "Cítrico." }
        ],
        6: [
            { q: "¿Cuál es la unidad mínima de vida?", a: "Célula", o: ["Célula", "Tejido"], h: "Forma todo el cuerpo." },
            { q: "¿Qué sistema digiere la comida?", a: "Digestivo", o: ["Digestivo", "Nervioso"], h: "Usa el estómago." },
            { q: "¿Cuál es el planeta rojo?", a: "Marte", o: ["Marte", "Venus"], h: "Tiene óxido." },
            { q: "¿Los hongos son plantas?", a: "Falso", o: ["Verdadero", "Falso"], h: "Reino Fungi." },
            { q: "¿Cuántos planetas hay en el sistema solar?", a: "8", o: ["8", "9", "7"], h: "Plutón no cuenta." },
            { q: "¿Capa gaseosa de la Tierra?", a: "Atmósfera", o: ["Atmósfera", "Hidrósfera"], h: "Donde está el aire." },
            { q: "¿Recurso natural renovable?", a: "Viento", o: ["Viento", "Petróleo"], h: "No se agota." },
            { q: "¿Hueso más largo del cuerpo?", a: "Fémur", o: ["Fémur", "Radio"], h: "Está en el muslo." },
            { q: "¿El cerebro es del sistema...?", a: "Nervioso", o: ["Nervioso", "Muscular"], h: "Envía impulsos." },
            { q: "¿Qué gas eliminan las plantas?", a: "Oxígeno", o: ["Oxígeno", "CO2"], h: "Es vital para nosotros." },
            { q: "¿Célula que tiene cloroplastos?", a: "Vegetal", o: ["Vegetal", "Animal"], h: "De las plantas." },
            { q: "¿La luz viaja en línea recta?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Rayos de luz." },
            { q: "¿Animal que vive en agua y tierra?", a: "Anfibio", o: ["Anfibio", "Mamífero"], h: "Como la rana." },
            { q: "¿Qué mide un termómetro?", a: "Temperatura", o: ["Temperatura", "Peso"], h: "Los grados." },
            { q: "¿El sonido viaja por el vacío?", a: "Falso", o: ["Verdadero", "Falso"], h: "Necesita aire o agua." },
            { q: "¿Cuál animal es invertebrado?", a: "Pulpo", o: ["Pulpo", "Gato"], h: "No tiene huesos." },
            { q: "¿El aire tiene masa (pesa)?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Ocupa un lugar." },
            { q: "¿A qué temperatura hierve el agua?", a: "100°C", o: ["100°C", "50°C"], h: "Ebullición." },
            { q: "¿Protege de rayos UV?", a: "Capa de Ozono", o: ["Capa de Ozono", "Nubes"], h: "En la atmósfera." },
            { q: "¿La energía eólica contamina?", a: "Falso", o: ["Verdadero", "Falso"], h: "Es energía limpia." }
        ],
        7: [
            { q: "¿Dónde está el material genético?", a: "Núcleo", o: ["Núcleo", "Citoplasma"], h: "Centro de control celular." },
            { q: "¿Movimiento de traslación causa...?", a: "Las estaciones", o: ["Las estaciones", "El día"], h: "Tarda un año." },
            { q: "¿Gas más abundante en el aire?", a: "Nitrógeno", o: ["Nitrógeno", "Oxígeno"], h: "Es el 78%." },
            { q: "¿Energía del calor interno terrestre?", a: "Geotérmica", o: ["Geotérmica", "Hidráulica"], h: "Geo = Tierra." },
            { q: "¿La materia se destruye?", a: "Falso", o: ["Verdadero", "Falso"], h: "Se transforma." },
            { q: "¿Qué mide la presión atmosférica?", a: "Barómetro", o: ["Barómetro", "Anemómetro"], h: "Usa mercurio." },
            { q: "¿Quién propuso la evolución?", a: "Darwin", o: ["Darwin", "Newton"], h: "Charles." },
            { q: "¿Velocidad de la luz es constante?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "En el vacío." },
            { q: "¿Metal que es líquido?", a: "Mercurio", o: ["Mercurio", "Hierro"], h: "En termómetros." },
            { q: "¿Centro del átomo?", a: "Núcleo", o: ["Núcleo", "Órbita"], h: "Tiene protones." },
            { q: "¿El Sol es una estrella?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Tipo espectral G2V." },
            { q: "¿Reserva de agua dulce más grande?", a: "Glaciares", o: ["Glaciares", "Océanos"], h: "Está congelada." },
            { q: "¿Qué órgano limpia la sangre?", a: "Riñones", o: ["Riñones", "Pulmones"], h: "Hacen orina." },
            { q: "¿Fuerza que atrae los cuerpos?", a: "Gravedad", o: ["Gravedad", "Fricción"], h: "Descubierta por Newton." },
            { q: "¿Arcoíris es por refracción?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Luz en el agua." },
            { q: "¿Existen células procariotas?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Sin núcleo definido." },
            { q: "¿Qué estudia la zoología?", a: "Animales", o: ["Animales", "Plantas"], h: "Zoo significa animal." },
            { q: "¿La Tierra es redonda perfecta?", a: "Falso", o: ["Verdadero", "Falso"], h: "Achatada en polos." },
            { q: "¿Qué mide la escala Richter?", a: "Sismos", o: ["Sismos", "Lluvias"], h: "Magnitud de temblor." },
            { q: "¿El CO2 causa efecto invernadero?", a: "Verdadero", o: ["Verdadero", "Falso"], h: "Atrapa el calor." }
        ]
    };

    let app = { g: 0, n: 0, p: 0, f: 0, sel: null };

    function iniciarApp(g) {
        app = { g: g, n: 0, p: 0, f: 0, sel: null };
        document.getElementById('nav-bar').style.display = 'flex';
        mostrarVista('scr-play');
        cargarPregunta();
    }

    function cargarPregunta() {
        const d = NIVELES[app.g][app.n];
        app.sel = null;
        app.f = 0;
        
        document.getElementById('lvl-badge').innerText = `Nivel ${app.n + 1}`;
        document.getElementById('pts-count').innerText = `${app.p} pts`;
        document.getElementById('q-title').innerText = d.q;
        document.getElementById('p-fill').style.width = `${((app.n + 1) / 20) * 100}%`;
        document.getElementById('hint-box').style.display = 'none';
        
        const lista = document.getElementById('options-list');
        lista.innerHTML = '';

        d.o.forEach(opt => {
            const b = document.createElement('div');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                app.sel = opt;
            };
            lista.appendChild(b);
        });
    }

    function validarOpcion() {
        const d = NIVELES[app.g][app.n];
        
        if (!app.sel) {
            alert("Selecciona una respuesta primero.");
            return;
        }

        if (app.sel === d.a) {
            app.p += 50;
            if (app.n < 19) {
                app.n++;
                cargarPregunta();
            } else {
                irAlFinal();
            }
        } else {
            app.f++;
            if (app.f >= 2) {
                document.getElementById('hint-box').style.display = 'block';
                document.getElementById('hint-text').innerText = d.h;
            }
            alert("¡Incorrecto! Vuelve a intentar.");
        }
    }

    function nivelPrevio() {
        if (app.n > 0) {
            app.n--;
            cargarPregunta();
        }
    }

    // RESET TOTAL: Esta función es radical para volver al inicio
    function resetTotal() {
        // Limpiamos variables
        app = { g: 0, n: 0, p: 0, f: 0, sel: null };
        // Ocultamos la barra de navegación
        document.getElementById('nav-bar').style.display = 'none';
        // Limpiamos cualquier contenido visual residual
        document.getElementById('options-list').innerHTML = '';
        // Volvemos a la pantalla de inicio
        mostrarVista('scr-start');
    }

    function irAlFinal() {
        document.getElementById('nav-bar').style.display = 'none';
        document.getElementById('final-score').innerText = app.p;
        mostrarVista('scr-win');
    }

    function mostrarVista(id) {
        // Ocultamos todas las pantallas
        const pantallas = ['scr-start', 'scr-play', 'scr-win'];
        pantallas.forEach(p => {
            document.getElementById(p).style.display = 'none';
            document.getElementById(p).classList.remove('active');
        });
        // Mostramos solo la indicada
        const target = document.getElementById(id);
        target.style.display = 'block';
        setTimeout(() => target.classList.add('active'), 10);
    }
</script>
</body>
</html>
